services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postupi
      POSTGRES_USER: postupi
      POSTGRES_PASSWORD: postupi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postupi -d postupi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - path: .env
        required: false
    environment:
      POSTUPI_DATABASE_URL: postgresql+asyncpg://postupi:postupi@postgres:5432/postupi
      POSTUPI_REDIS_URL: redis://redis:6379/0
      POSTUPI_UID_HMAC_SECRET: ${POSTUPI_UID_HMAC_SECRET:?POSTUPI_UID_HMAC_SECRET is required}
      POSTUPI_TEST_DATABASE_URL: postgresql+asyncpg://postupi:postupi@postgres:5432/postupi
    ports:
      - "8000:8000"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-m", "apps.api.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["arq", "apps.worker.main.WorkerSettings"]
    env_file:
      - path: .env
        required: false
    environment:
      POSTUPI_DATABASE_URL: postgresql+asyncpg://postupi:postupi@postgres:5432/postupi
      POSTUPI_REDIS_URL: redis://redis:6379/0
      POSTUPI_UID_HMAC_SECRET: ${POSTUPI_UID_HMAC_SECRET:?POSTUPI_UID_HMAC_SECRET is required}
      POSTUPI_TEST_DATABASE_URL: postgresql+asyncpg://postupi:postupi@postgres:5432/postupi
    depends_on:
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-m", "apps.worker.healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5

  bot:
    profiles: ["bot"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "apps.bot.main"]
    environment:
      POSTUPI_REDIS_URL: redis://redis:6379/0
      POSTUPI_TELEGRAM_BOT_TOKEN: ${POSTUPI_TELEGRAM_BOT_TOKEN:-}
    depends_on:
      redis: {condition: service_healthy}

volumes:
  postgres_data:
  redis_data:
